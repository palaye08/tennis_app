version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tennis-mysql
    environment:
      MYSQL_ROOT_PASSWORD: passer123
      MYSQL_DATABASE: tennis_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tennis-network

  backend:
    build: .
    container_name: tennis-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tennis_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: passer123
    depends_on:
      - mysql
    networks:
      - tennis-network

networks:
  tennis-network:
    driver: bridge

volumes:
  mysql_data:
